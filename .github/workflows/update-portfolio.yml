name: Auto Update Portfolio Projects

on:
  push:
    branches:
      - main
  workflow_dispatch: # This adds a manual "Run workflow" trigger button!

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Update Script
      run: python update_projects.py

    - name: Commit and Push Changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Automated update of projects.json [skip ci]"
        file_pattern: 'projects.json'
